# Supplemental RBAC for the "flink" ServiceAccount.
#
# The Helm-managed Role (cp-flink-kubernetes-operator) grants pods, configmaps,
# and deployments — but NOT services.  Flink's Kubernetes session-cluster executor
# needs to GET the JobManager REST service (e.g. flink-basic-rest) to submit jobs.
#
# This Role + RoleBinding fills that gap.  It is additive — Kubernetes merges
# permissions across all Roles bound to the same subject, so the Helm-managed
# Role is unaffected.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-services
  namespace: confluent
  labels:
    app.kubernetes.io/name: flink-kubernetes-operator
    app.kubernetes.io/component: flink-sa-supplement
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-services-binding
  namespace: confluent
  labels:
    app.kubernetes.io/name: flink-kubernetes-operator
    app.kubernetes.io/component: flink-sa-supplement
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-services
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: confluent
