# Grafana for the Isotope metrics showcase — auto-provisioned with the
# Prometheus datasource and a pre-built dashboard, so `up` → open → done.
#
# Anonymous viewer access is ON (Admin role) so the demo opens straight to the
# dashboard with no login. This is a throwaway showcase instance — do NOT copy
# this auth posture to anything real.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: isotope
        orgId: 1
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-isotope
  namespace: monitoring
data:
  isotope.json: |
    {
      "title": "Isotope — stateless reports (Micrometer → Prometheus)",
      "uid": "isotope-stateless",
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-30m", "to": "now" },
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "pipeline",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(isotope_hop_latency_seconds_count, pipeline)",
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "type": "row", "title": "Produce side (interceptor on send)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "timeseries", "title": "latency_1m — avg origin→hop latency",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pipeline, origin_service, this_topic) (rate(isotope_hop_latency_seconds_sum{pipeline=~\"$pipeline\"}[1m])) / sum by (pipeline, origin_service, this_topic) (rate(isotope_hop_latency_seconds_count{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "{{origin_service}} → {{this_topic}}"
            }
          ]
        },
        {
          "type": "timeseries", "title": "latency_1m — max origin→hop latency",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "max by (pipeline, origin_service, this_topic) (isotope_hop_latency_seconds_max{pipeline=~\"$pipeline\"})",
              "legendFormat": "{{origin_service}} → {{this_topic}}"
            }
          ]
        },
        {
          "type": "timeseries", "title": "topology_1m — produce-edge records/min",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (this_service, this_topic) (increase(isotope_hop_latency_seconds_count{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "{{this_service}} → {{this_topic}}"
            }
          ]
        },
        {
          "type": "timeseries", "title": "hop_distribution_1m — records/min by hop_count",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (hop_count) (increase(isotope_hop_records_total{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "hop {{hop_count}}"
            }
          ]
        },
        {
          "type": "row", "title": "Consume side (marker / adoption path)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 }
        },
        {
          "type": "timeseries", "title": "consume edges — records/min (topic→consumer)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 18 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (this_topic, consumer_service) (increase(isotope_consume_records_total{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "{{this_topic}} → {{consumer_service}}"
            }
          ]
        },
        {
          "type": "timeseries", "title": "time-to-consume — avg origin→consume",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 18 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (consumer_service, this_topic) (rate(isotope_consume_latency_seconds_sum{pipeline=~\"$pipeline\"}[1m])) / sum by (consumer_service, this_topic) (rate(isotope_consume_latency_seconds_count{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "{{consumer_service}} ← {{this_topic}}"
            }
          ]
        },
        {
          "type": "timeseries", "title": "consume age — avg staleness at pickup",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 18 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (consumer_service, this_topic) (rate(isotope_consume_age_seconds_sum{pipeline=~\"$pipeline\"}[1m])) / sum by (consumer_service, this_topic) (rate(isotope_consume_age_seconds_count{pipeline=~\"$pipeline\"}[1m]))",
              "legendFormat": "{{consumer_service}} ← {{this_topic}}"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            # Land straight on the provisioned dashboard.
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/isotope.json
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: datasource
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-isotope
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
