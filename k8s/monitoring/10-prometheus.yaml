# Prometheus for the Isotope metrics showcase.
#
# Architecture A: the Isotope pipeline stages run on the HOST via
# `./gradlew :app:run` (see scripts/cc-app-run.sh), NOT in-cluster. Each stage
# is launched on a distinct metrics port and Prometheus — running here as a
# Minikube pod — scrapes them across the Minikube→host bridge
# `host.minikube.internal`.
#
# Stage → port convention used below (one port per locally-run stage so they
# don't collide on the host):
#   enrich  → 9410     fulfill → 9411     ship → 9412
# Launch each stage with, e.g.:
#   ./gradlew :app:run -Dmetrics.prometheus.enabled=true \
#     -Dmetrics.prometheus.port=9410 -Disotope.consume.from=latest --args="enrich"
# (the consume.from=latest flag skips the replay backlog — see README §4.6.1.)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    scrape_configs:
      - job_name: isotope-stages
        metrics_path: /metrics
        static_configs:
          - targets: ['host.minikube.internal:9410']
            labels:
              stage: enrich
          - targets: ['host.minikube.internal:9411']
            labels:
              stage: fulfill
          - targets: ['host.minikube.internal:9412']
            labels:
              stage: ship
          # Spare slots — uncomment and launch the stage on the matching port:
          # - targets: ['host.minikube.internal:9413']
          #   labels: {stage: hop}
          # - targets: ['host.minikube.internal:9414']
          #   labels: {stage: consume}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            # Demo retention — a couple hours is plenty and keeps the emptyDir small.
            - --storage.tsdb.retention.time=2h
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
