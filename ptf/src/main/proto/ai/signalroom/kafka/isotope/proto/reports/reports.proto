syntax = "proto3";

package ai.signalroom.kafka.isotope.proto.reports;

option java_package = "ai.signalroom.kafka.isotope.proto.reports";
option java_multiple_files = true;
option java_outer_classname = "ReportsProto";

// Wire-format schema for the latency-percentiles report, written by
// shared/70_latency_percentiles_report.fql to the
// isotope-report-latency-percentiles-1m Kafka topic from the
// cp-flink session cluster. The other 4 reports (latency, topology,
// hop_distribution, coverage) moved to CMF Statements (see
// flink/sql/cmf/ and scripts/deploy-cmf-reports.sh), and their
// schemas are auto-registered in Schema Registry by CMF — they don't
// need .proto definitions in this repo.
//
// Why this one stays here: the percentiles report uses the
// LATENCY_PERCENTILES T-Digest UDAF, which CMF Statements don't
// support. It runs on the open-source FlinkDeployment session cluster
// with Apache Flink's `protobuf` format (no SR magic byte). The format
// reads the message class via `protobuf.message-class-name` in the
// sink DDL, so the generated Java needs to be on the Flink classpath
// (bundled into isotope-flink-udf.jar via the protobuf Gradle plugin
// in ptf/build.gradle).
//
// Window times ride as BIGINT epoch millis on the wire (not
// google.protobuf.Timestamp) because Flink's protobuf format maps
// google.protobuf.Timestamp to a nested ROW(seconds, nanos), not a
// Flink TIMESTAMP. Consumers can rehydrate via
// TO_TIMESTAMP_LTZ(window_start, 3).

message LatencyPercentilesFlatReport {
    int64  window_start   = 1;    // epoch millis
    int64  window_end     = 2;    // epoch millis
    string origin_service = 3;
    string this_topic     = 4;
    double p50_ms         = 5;
    double p95_ms         = 6;
    double p99_ms         = 7;
    int64  sample_count   = 8;
}
